<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>格道黑科技 - 签到领奖励</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-lg p-6">
        <!-- 标题 -->
        <h1 class="text-2xl font-bold text-center mb-6">📅 连续签到领奖励</h1>

        <!-- 【已移到最顶部】邮箱绑定区域 -->
        <div class="bg-blue-50 p-4 rounded-lg mb-6">
            <h3 class="font-bold text-center text-blue-600 mb-3">📩 先绑定邮箱，奖励统一发放</h3>
            <input type="email" id="email-input" placeholder="请输入您的常用邮箱（必填）" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <p class="text-xs text-center text-gray-500 mt-2">⚠️ 所有签到奖励将统一发送至该邮箱，请准确填写</p>
        </div>

        <!-- 签到状态 -->
        <div class="bg-gray-50 rounded-lg p-4 mb-6">
            <p class="mb-2">📧 已绑定邮箱：<span id="email-display" class="text-blue-600 font-bold">未绑定</span></p>
            <p class="mb-4">🔥 连续签到：<span id="days-display" class="text-red-500 font-bold">0</span> 天</p>
            <div class="w-full bg-gray-200 rounded-full h-3">
                <div id="progress-bar" class="bg-blue-500 h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>

        <!-- 签到按钮 -->
        <button id="sign-btn" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-lg mb-6 transition-colors">
            立即签到
        </button>

        <!-- 奖励列表 -->
        <div class="space-y-3 mb-6">
            <h3 class="font-bold text-lg">🎁 签到奖励一览</h3>
            <div class="p-3 border rounded-lg bg-gray-50">
                <p class="font-semibold">连续签到1天</p>
                <p class="text-sm text-gray-600">2026最新院线电影合集</p>
            </div>
            <div class="p-3 border rounded-lg bg-gray-50">
                <p class="font-semibold">连续签到3天</p>
                <p class="text-sm text-gray-600">4月新番全集 + 10款AI工具大礼包</p>
            </div>
            <div class="p-3 border rounded-lg bg-gray-50">
                <p class="font-semibold">连续签到7天</p>
                <p class="text-sm text-gray-600">美团拍照掘金全套教程</p>
            </div>
            <div class="p-3 border rounded-lg bg-gray-50">
                <p class="font-semibold">连续签到15天</p>
                <p class="text-sm text-gray-600">全站所有资源 + VIP内部交流群</p>
            </div>
        </div>

        <!-- 规则说明 -->
        <div class="bg-yellow-50 p-4 rounded-lg text-sm text-gray-700">
            <h4 class="font-bold mb-2">📌 签到规则</h4>
            <ul class="space-y-1">
                <li>1. 每日可签到1次，断签后签到进度将重置为0天</li>
                <li>2. 所有奖励自动发放至绑定邮箱，无需手动领取</li>
                <li>3. 连续签到天数越高，解锁的奖励越丰厚</li>
            </ul>
        </div>
    </div>

    <script>
        // 初始化DOM元素
        const signBtn = document.getElementById('sign-btn');
        const daysDisplay = document.getElementById('days-display');
        const emailDisplay = document.getElementById('email-display');
        const emailInput = document.getElementById('email-input');
        const progressBar = document.getElementById('progress-bar');

        // 读取本地存储数据
        let lastSignDate = localStorage.getItem('lastSignDate');
        let continuousDays = parseInt(localStorage.getItem('continuousDays') || 0);
        let userEmail = localStorage.getItem('userEmail') || '';

        // 页面加载时更新显示
        function updateDisplay() {
            daysDisplay.textContent = continuousDays;
            emailDisplay.textContent = userEmail || '未绑定';
            progressBar.style.width = `${Math.min(continuousDays / 15 * 100, 100)}%`;
            if (userEmail) {
                emailInput.value = userEmail;
            }
        }

        // 签到按钮点击事件
        signBtn.addEventListener('click', function() {
            const email = emailInput.value.trim();
            if (!email) {
                alert('请先输入您的邮箱！\n所有奖励将发送至该邮箱');
                return;
            }

            // 保存邮箱
            userEmail = email;
            localStorage.setItem('userEmail', email);
            emailDisplay.textContent = email;

            const today = new Date().toDateString();
            if (lastSignDate === today) {
                alert('✅ 您今天已经签到过了！明天再来吧~');
                return;
            }

            // 检查是否断签
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toDateString();

            if (lastSignDate !== yesterdayStr) {
                continuousDays = 0;
            }

            // 签到成功
            continuousDays++;
            lastSignDate = today;
            localStorage.setItem('lastSignDate', today);
            localStorage.setItem('continuousDays', continuousDays);

            // 更新显示
            updateDisplay();

            // 提示信息
            alert(`🎉 签到成功！\n连续签到天数：${continuousDays} 天\n奖励将在24小时内发送至：${email}`);
        });

        // 初始化显示
        updateDisplay();
    </script>
</body>
</html>
