        <div class="tip">长按图片保存到手机</div>
    </div>

        <div class="bar"><div class="barIn" id="bar"></div></div>
    </div>

    <button class="btn" id="signBtn">一键复制文案 去发朋友圈</button>

        <p style="font-weight:bold;margin-bottom:10px;">🎁 签到奖励一览</p>
        <div class="rewardItem">
            <div>连续签到1天</div>
            <div style="font-size:12px;color:#666;">2026最新院线电影合集</div>
        </div>
        <div class="rewardItem">
            <div>连续签到3天</div>
            <div style="font-size:12px;color:#666;">4月新番全集+AI工具大礼包</div>
        </div>
        <div class="rewardItem">
            <div>连续签到7天</div>
            <div style="font-size:12px;color:#666;">副业全套实操教程</div>
        </div>
        <div class="rewardItem">
            <div>连续签到15天</div>
            <div style="font-size:12px;color:#666;">全站资源+VIP内部群</div>
        </div>
    </div>

        <p>1.每日限签到1次，断签天数清零</p>
        <p>2.必须转发朋友圈+上传截图才算有效</p>
        <p>3.所有奖励统一发送至绑定邮箱</p>

<!-- 上传截图弹窗 -->
<div class="pop" id="pop">
    <div class="popCon">
        <h3>上传朋友圈截图</h3>
        <p style="font-size:13px;color:#666;margin:8px 0;">上传完整朋友圈发布截图</p>
        <input type="file" id="file" accept="image/*">
        <div class="fileName" id="fileTip">已选择图片</div>
        <div class="popBtn">
            <button class="btn1" id="closePop">取消</button>
            <button class="btn2" id="subBtn" disabled>提交截图</button>
        </div>
    </div>
</div>

<script>
//转发文案
const text = `【格道资源站】免费分享2026最新影视、动漫、AI工具、副业项目！
我已经领到超多优质资源，免费分享给大家👇
关注公众号【格道黑科技】，回复：资源站 直达获取`;

//邮箱正则强验证
const mailReg = /^[a-zA-Z0-9_-]+@[a-zA-Z0-9_-]+(\.[a-zA-Z0-9_-]+)+$/;

//元素
let mail = document.getElementById('mail');
let mailShow = document.getElementById('mailShow');
let day = document.getElementById('day');
let bar = document.getElementById('bar');
let signBtn = document.getElementById('signBtn');
let pop = document.getElementById('pop');
let file = document.getElementById('file');
let fileTip = document.getElementById('fileTip');
let subBtn = document.getElementById('subBtn');
let closePop = document.getElementById('closePop');

//本地存储
let lastDay = localStorage.getItem('lastDay') || '';
let contDay = Number(localStorage.getItem('contDay')) || 0;
let saveMail = localStorage.getItem('saveMail') || '';

//初始化
function init(){
    day.innerText = contDay;
    mailShow.innerText = saveMail || "未绑定";
    mail.value = saveMail;
    bar.style.width = Math.min(contDay/15*100,100)+"%";
}
init();

//签到按钮
signBtn.onclick = async function(){
    let m = mail.value.trim();
    if(!m){alert("请先填写邮箱！");return;}
    if(!mailReg.test(m)){alert("请填写完整有效邮箱\n例：123@qq.com");return;}
    saveMail = m;
    localStorage.setItem('saveMail',m);
    mailShow.innerText = m;

    let now = new Date().toDateString();
    if(lastDay === now){alert("今日已签到，明天再来！");return;}

    //复制文案
    try{await navigator.clipboard.writeText(text);}catch(e){}
    alert("✅文案已复制\n1.长按图片保存\n2.打开朋友圈粘贴发布\n3.返回上传截图完成签到");
    pop.style.display = "block";
}

//选择图片
file.onchange = function(){
    if(this.files[0]){
        fileTip.style.display = "block";
        subBtn.disabled = false;
    }
}

//关闭弹窗
closePop.onclick = function(){
    pop.style.display = "none";
    file.value = "";
    fileTip.style.display = "none";
    subBtn.disabled = true;
}

//提交截图
subBtn.onclick = function(){
    let now = new Date().toDateString();
    let yesDay = new Date();
    yesDay.setDate(yesDay.getDate()-1);
    let yesStr = yesDay.toDateString();

    if(lastDay !== yesStr) contDay = 0;
    contDay++;
    lastDay = now;

    localStorage.setItem('contDay',contDay);
    localStorage.setItem('lastDay',lastDay);

    pop.style.display = "none";
    file.value = "";
    fileTip.style.display = "none";
    subBtn.disabled = true;
    init();
    alert("🎉签到成功！\n连续"+contDay+"天\n奖励将发放至："+saveMail);
}
</script>
